<body>
  
        <h1>Feedback Form</h1>
        <form action="/action">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Write your name"><br><br>
            <label for="mail">Email:</label>
            <input type="email" id="mail" placeholder="Write your email"><br><br>
            <label for="mes">Message:</label><br>
            <textarea name="feeb" id="mes" cols="30" rows="7"></textarea><br><br>
            <label >Rate us from 5:</label><br>
            <input type="radio" name="rating" value="1"> 1 <br>
            <input type="radio" name="rating" value="2"> 2 <br>
            <input type="radio" name="rating" value="3"> 3 <br>
            <input type="radio" name="rating" value="4"> 4 <br>
            <input type="radio" name="rating" value="5"> 5 <br><br>
            <button> Send your message!</button>
        </form>
   
    
</body>
