<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            margin: 0 auto;
            height: 400px;
            width: 400px;
            border: 5px solid teal;
            border-radius: 15px;
            font-size: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items:center;
            background-color: cadetblue;
            
        }
        .inner{
            color: aliceblue;
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 12px;
            background-color: gray;
            text-align: center;
        }
        .inner:hover{
            box-shadow: 5px 5px 30px white;
        }
        nav{
            padding: 12px;
            max-width: 100%;
            height: 50px;
            font-size: 24px;
            border: 2px solid teal;
            background-color: pink;
            border-radius: 15px;

            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        .links{
            margin-right: 35px;
        }
        .logo{
            margin-right: 60px;
        }
        .links:hover{
            transition: all 0.5s;
            transform: scale(1.5);
            color: aliceblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <div class="links logo">logo</div>
        <div class="links">Home</div>
        <div class="links">About</div>
        <div class="links">Contact</div>
    </nav>
    <center><h1>
        Assignment 5
    </h1></center>
    <div class="container">
        <div class="inner">A</div>
        <div class="inner">B</div>
        <div class="inner">C</div>
        <div class="inner">D</div>
        <div class="inner">E</div>
        <div class="inner">F</div>
        <div class="inner">G</div>
        <div class="inner">H</div>
        <div class="inner">I</div>
    </div>

    
</body>
</html>
