<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 150px;
            width: 150px;
            border: 2px solid black;
            background-color: aquamarine;
            padding: 5px;
        }
        .one{
            background-color: cornflowerblue;
            position: relative;
            z-index: 10;
        }
        .two{
            background-color:dodgerblue;
            position: relative;
            left: 35px;
            bottom: 55px;
            text-align: end;
            z-index: 3;
        }
        .last{
            position: relative;
            left: 75px;
            bottom: 85px;
            text-align: end;

        }
    </style>
</head>
<body>
    <center><h1>Z-Index</h1></center>
    <div class="cont">
        <div class="box one">1st</div>
        <div class="box two">2nd</div>
        <div class="box last">3rd</div>
    </div>
    
</body>
</html>
