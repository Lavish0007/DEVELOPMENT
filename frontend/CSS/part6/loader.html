<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .loader{
            height: 200px;
            width: 200px;
            border: 15px solid rgb(181, 181, 181);
            border-radius: 50%;
            border-top: 15px solid blue;
            animation: spin 2s linear 0s infinite;
        }
        
        @keyframes spin {
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);

            }
        }
    </style>
</head>
<body>
    <center><h1>LOADER</h1>
        <div class="loader">
    
        </div>
    
    </center>
    
</body>
</html>
