<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            border: 5px solid black;
            background-color: dodgerblue;
            display: inline-block;
            margin: 15px;
        }
        #yu{
            display: none;
        }
    </style>
</head>
<body>
    <!-- Inline use krne se browser height width margin padding sab ignore krne lagta hai, jisse unexpected cheezen show hoti hai, Isliye inline block use krte hai taaki property bhi applied rhe aur inline ki tarah bhi treat ho  -->
     <center><h1>Inline Block Usage </h1></center>
     <div></div>
     <div></div>
     <div> </div>
     <div id="yu"></div>
    
</body>
</html>
