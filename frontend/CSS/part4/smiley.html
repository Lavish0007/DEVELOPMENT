<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .face {
        border-radius: 50%;
        height: 400px;
        width: 400px;
        background-color: rgb(255, 213, 0);
      }
      .eyes {
        width: 80px;
        height: 80px;
        background-color: black;
        border-radius: 50%;
        position: absolute;
      }
      .left {
        top: 80px;
        left: 80px;
      }
      .right {
        top: 80px;
        left: 240px;
      }
      .smile{
        height: 80px;
        width: 200px;
        background-color: brown;
        border-radius: 0 0 50px 50px;
        position: absolute;
        top: 250px;
        left: 100px;
      }
    </style>
  </head>
  <body>

        <div class="face">
          <div class="eyes left"></div>
          <div class="eyes right"></div>
          <div class="smile">
    
          </div>
        </div>

  </body>
</html>
