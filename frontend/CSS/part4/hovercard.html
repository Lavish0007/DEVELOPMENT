<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: black;
        }
        .card{
            width: 400px;
            height: 400px;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 5px;
            margin: 30px;
            display: inline-block;
            box-shadow: 8px 8px 8px rgb(114, 133, 244);
            color: aliceblue;
            font-weight: 700;
        }
        .card img{
            width: 100%;
            border-radius:  5px 5px 0 0 ;
            border-bottom:2px solid white ;
        }
        .desc{
            padding: 0 15px 0 15px;
        }
        .card:hover{
            box-shadow: 16px 16px 18px rgb(255, 255, 255);

        }
        .head{
            height: 100px;
            width: 280px;
            margin-bottom: 20px;
        }
        .head img{
            width: 100%;

        }
    </style>
</head>
<body>
    <center>
        <div class="head">
            <img src="a.jpg" alt="">
        </div>
    </center>
    <center>

        <div class="card">
            <img src="ironman.jpg" alt="">
            <div class="desc">
                <h3>Iron Man</h3>
                <p>The Tech savy Genius</p>
            </div>
        </div>
        <div class="card">
            <img src="bwidow.jpeg" alt="">
            <div class="desc">
                <h3>Black Widow</h3>
                <p>The Kill machine</p>
        
            </div>
        </div>
    </center>
    
</body>
</html>
