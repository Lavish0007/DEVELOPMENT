<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 50px;
        }

        div{
            height: 50px;
            width: 50px;
            background-color: plum;
            text-align: center;
            margin-top: 30px;
            padding: 5px;
        }
        .one,.thr,.fiv{
            background-color: crimson;
        }

        .one{
            transform: rotate(45deg);
            
        }
        .two{
            transform: scale(0.8);
        }
        .thr{
            transform: translate(-100px);
        }
        .four{
            transform: skew(30deg);
        }
        .fiv{
            transform: rotate(45deg) translate(100px) scale(1.5) skew(20deg);
        }
        
    </style>
</head>
<body>
    <center>
        <h1>TRANSFORM PROPERTIES</h1>
        <section>
            <div class="one">rotate</div>
            <div class="two">scale</div>
            <div class="thr">translate</div>
            <div class="four">skew</div>
            <div class="fiv">all</div>
        </section>
    </center>
    
</body>
</html>
